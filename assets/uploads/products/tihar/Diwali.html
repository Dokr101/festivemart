<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diwali Firecracker Animation</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 191, 36, 0.16), transparent 28%),
        linear-gradient(180deg, #12091f 0%, #090312 55%, #040108 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .glow-orb {
      position: absolute;
      inset: auto;
      width: 38vw;
      height: 38vw;
      border-radius: 9999px;
      filter: blur(90px);
      opacity: 0.22;
      pointer-events: none;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .glow-a {
      top: -10vw;
      left: -8vw;
      background: #ff7a18;
    }

    .glow-b {
      right: -10vw;
      bottom: -14vw;
      background: #7c3aed;
      animation-duration: 18s;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(4vw, -2vw, 0) scale(1.12); }
    }

    #fireworks {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .title-glow {
      text-shadow: 0 0 24px rgba(255, 198, 84, 0.35);
    }

    .subtitle-glow {
      text-shadow: 0 0 18px rgba(255, 160, 122, 0.2);
    }
  </style>
</head>
<body>
  <div class="glow-orb glow-a"></div>
  <div class="glow-orb glow-b"></div>

  <canvas id="fireworks"></canvas>

  <main class="relative z-10 flex min-h-screen items-center justify-center px-6 text-center">
    <section class="max-w-4xl">
      <div class="mb-5 text-sm uppercase tracking-[0.55em] text-amber-200/70">Festival Of Lights</div>
      <h1 class="title-glow text-5xl font-semibold tracking-[0.12em] text-amber-100 sm:text-7xl md:text-8xl">DIWALI</h1>
      <p class="subtitle-glow mx-auto mt-6 max-w-2xl text-base leading-7 text-orange-100/80 sm:text-lg">
        Welcome your visitors with elegant, celebratory firecracker bursts that launch automatically and continue softly in the background.
      </p>
      <div class="mt-8 flex items-center justify-center gap-4">
        <button id="celebrateBtn" class="rounded-full border border-amber-200/30 bg-amber-100/10 px-6 py-3 text-sm font-semibold uppercase tracking-[0.22em] text-amber-50 backdrop-blur-sm transition hover:bg-amber-100/18">
          Replay Fireworks
        </button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    const celebrateBtn = document.getElementById('celebrateBtn');

    let width = 0;
    let height = 0;
    let rockets = [];
    let particles = [];
    let animationFrameId = null;
    let autoLaunchTimer = null;

    const palette = [
      '#ffd166', '#ff9f1c', '#ff6b6b', '#f15bb5', '#9b5de5', '#00bbf9', '#00f5d4', '#ffffff'
    ];

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    class Rocket {
      constructor(x, targetY, color) {
        this.x = x;
        this.y = height + 20;
        this.targetY = targetY;
        this.color = color;
        this.speed = 5 + Math.random() * 2.5;
        this.trail = [];
        this.exploded = false;
      }

      update() {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 8) this.trail.shift();
        this.y -= this.speed;
        this.speed *= 1.01;

        if (this.y <= this.targetY && !this.exploded) {
          this.exploded = true;
          explode(this.x, this.y, this.color);
        }
      }

      draw() {
        ctx.beginPath();
        for (let i = 0; i < this.trail.length; i++) {
          const point = this.trail[i];
          const alpha = i / this.trail.length;
          ctx.fillStyle = rgbaFromHex(this.color, alpha * 0.5);
          ctx.beginPath();
          ctx.arc(point.x, point.y, 1.5 + alpha * 1.8, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    class Particle {
      constructor(x, y, color, velocity, life, radius) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.velocity = velocity;
        this.life = life;
        this.remaining = life;
        this.radius = radius;
        this.gravity = 0.04 + Math.random() * 0.03;
        this.friction = 0.985;
      }

      update() {
        this.velocity.x *= this.friction;
        this.velocity.y *= this.friction;
        this.velocity.y += this.gravity;
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.remaining -= 1;
      }

      draw() {
        const alpha = Math.max(this.remaining / this.life, 0);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function rgbaFromHex(hex, alpha) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function explode(x, y, color) {
      const count = 70 + Math.floor(Math.random() * 40);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 1 + Math.random() * 5.8;
        const variant = palette[Math.floor(Math.random() * palette.length)];
        particles.push(
          new Particle(
            x,
            y,
            Math.random() > 0.25 ? color : variant,
            {
              x: Math.cos(angle) * speed * (0.75 + Math.random() * 0.8),
              y: Math.sin(angle) * speed * (0.75 + Math.random() * 0.8)
            },
            55 + Math.random() * 28,
            1.3 + Math.random() * 2.2
          )
        );
      }

      for (let i = 0; i < 18; i++) {
        const spread = Math.random() * Math.PI * 2;
        const speed = 0.8 + Math.random() * 2.2;
        particles.push(
          new Particle(
            x,
            y,
            '#fff7d6',
            { x: Math.cos(spread) * speed, y: Math.sin(spread) * speed },
            36 + Math.random() * 18,
            2 + Math.random() * 1.8
          )
        );
      }
    }

    function launchRocket(x = Math.random() * width * 0.8 + width * 0.1) {
      const targetY = height * (0.18 + Math.random() * 0.36);
      const color = palette[Math.floor(Math.random() * palette.length)];
      rockets.push(new Rocket(x, targetY, color));
    }

    function launchSequence() {
      const bursts = 6;
      for (let i = 0; i < bursts; i++) {
        setTimeout(() => launchRocket(), i * 220);
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(4, 1, 8, 0.22)';
      ctx.fillRect(0, 0, width, height);

      rockets = rockets.filter((rocket) => {
        rocket.update();
        rocket.draw();
        return !rocket.exploded;
      });

      particles = particles.filter((particle) => {
        particle.update();
        particle.draw();
        return particle.remaining > 0;
      });

      animationFrameId = requestAnimationFrame(animate);
    }

    function startAmbientLaunches() {
      clearInterval(autoLaunchTimer);
      autoLaunchTimer = setInterval(() => {
        const count = 1 + Math.floor(Math.random() * 2);
        for (let i = 0; i < count; i++) {
          setTimeout(() => launchRocket(), i * 180);
        }
      }, 1400);
    }

    function init() {
      resizeCanvas();
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      animate();
      launchSequence();
      setTimeout(launchSequence, 900);
      startAmbientLaunches();
    }

    window.addEventListener('resize', resizeCanvas);
    celebrateBtn.addEventListener('click', launchSequence);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(autoLaunchTimer);
      } else {
        startAmbientLaunches();
      }
    });

    init();
  </script>
</body>
</html>
